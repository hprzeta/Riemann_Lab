# Configuration pour le calcul des zéros de ζ(s)
# AUTEUR : hprzeta- Exploration de l'Hypothèse de Riemann
# DATE : 2026

T_max: 1000.0           # Limite supérieure de recherche (t)
step: 0.1               # Pas initial (équilibre vitesse/précision)
tol: 1e-12              # Tolérance pour l'affinage Newton
max_iter: 50            # Max itérations Newton
expected_zeros: 1000    # Pour validation
lmfdb_check: true       # Vérification avec base LMFDB
save_csv: true
save_plots: true

# Monitoring
log_resources_interval: 30  # secondes
htop_enabled: true
