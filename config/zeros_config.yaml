# Configuration du pipeline Zêta — Riemann Lab
# AUTEUR : hprzeta- Exploration de l'Hypothèse de Riemann
# DATE : 2026

# ── Précision numérique ───────────────────────────────
dps: 30           # décimales mpmath (50 = très lent, 30 = bon compromis)

# ── Plage de recherche ────────────────────────────────
t_min: 14.0       # premier zéro connu ≈ 14.134
t_max: 1000.0     # limite supérieure
step: 0.1         # pas de la recherche grossière

# ── Affinage ─────────────────────────────────────────
tol: 1.0e-12      # tolérance Illinois
epsilon: 1.0e-9   # seuil de validation |ζ(1/2+it)| < epsilon

# ── Nombre de zéros ──────────────────────────────────
n_zeros: 1000     # stopper après n zéros validés

# ── Sorties ───────────────────────────────────────────
csv_output: "csv/zeros_computed.csv"
log_dir: "logs"
log_level: "INFO"   # DEBUG, INFO, WARNING, ERROR
